appId: com.linesman.app
productName: linesman
directories:
  buildResources: build
  output: release/${version}
files:
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.cache"
extraMetadata:
  main: out/main/index.js
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  artifactName: ${name}_${version}_linux_${arch}.${ext}
mac:
  icon: build/icon.png
  target:
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${name}_${version}_mac_${arch}.${ext}
win:
  icon: build/icon.png
  target:
    - target: portable
      arch:
        - x64
        - arm64
  artifactName: ${name}_${version}_win_${arch}.${ext}
publish:
  provider: github
  owner: mitchell-wallace
  repo: linesman
