name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --json tagName --jq .tagName > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, will add artifacts."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists != 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.check.outputs.exists != 'true'

      - name: Build and package
        if: steps.check.outputs.exists != 'true'
        run: npm run build && npx electron-builder ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
